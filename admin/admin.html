<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin - CD Beauty Lash</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <section class="login-page" id="login-page">
    <div class="login-box">
      <h1>Connexion Admin</h1>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Mot de passe">
      <button id="login-btn">Se connecter</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </section>

  <section class="admin-page" id="admin-page" style="display:none;">
    <div class="admin-header">
      <h1>Admin CD Beauty Lash</h1>
      <button id="logout-btn" class="logout-btn">Déconnexion</button>
    </div>
    <p>Gestion des réservations</p>

    <div id="reservations-list"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
